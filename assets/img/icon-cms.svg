<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" stroke="#1F5AA6" stroke-width="2" fill="#EBF2FA"/>
  <!-- Safe/vault body -->
  <rect x="14" y="16" width="36" height="30" rx="4" stroke="#1F5AA6" stroke-width="2" fill="#fff"/>
  <!-- Vault door circle -->
  <circle cx="32" cy="31" r="9" stroke="#2FA4A9" stroke-width="2"/>
  <!-- Vault dial marks -->
  <path d="M32 22v2" stroke="#1F5AA6" stroke-width="2" stroke-linecap="round"/>
  <path d="M32 38v2" stroke="#1F5AA6" stroke-width="2" stroke-linecap="round"/>
  <path d="M23 31h2" stroke="#1F5AA6" stroke-width="2" stroke-linecap="round"/>
  <path d="M39 31h2" stroke="#1F5AA6" stroke-width="2" stroke-linecap="round"/>
  <!-- Inner currency circle -->
  <circle cx="32" cy="31" r="4" fill="#F7931E" opacity="0.15"/>
