<!-- DMT (Domestic Money Transfer) Icon -->
<!-- TODO: Replace with official DMT/IMPS icon from https://www.npci.org.in if available -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" stroke="#2FA4A9" stroke-width="2" fill="#EAF7F7"/>
  <!-- Left person (sender) -->
  <circle cx="18" cy="24" r="4" fill="#2FA4A9"/>
  <path d="M12 36c0-3.31 2.69-6 6-6s6 2.69 6 6" stroke="#2FA4A9" stroke-width="2" stroke-linecap="round" fill="none"/>
  <!-- Right person (receiver) -->
  <circle cx="46" cy="24" r="4" fill="#1F5AA6"/>
  <path d="M40 36c0-3.31 2.69-6 6-6s6 2.69 6 6" stroke="#1F5AA6" stroke-width="2" stroke-linecap="round" fill="none"/>
  <!-- Transfer arrows -->
  <path d="M26 30h12" stroke="#F7931E" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M35 27l3 3-3 3" stroke="#F7931E" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M38 38H26" stroke="#F7931E" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M29 35l-3 3 3 3" stroke="#F7931E" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Currency lines -->
  <path d="M28 48h8M30 44h4" stroke="#2FA4A9" stroke-width="1.5" stroke-linecap="round"/>
</svg>
